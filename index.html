<script>
var USE_LOCAL_PROXY=location.hostname.indexOf("pages.dev")>=0;var PROXY_LOCAL="/api/proxy?url=";var PROXY_EXT="https://corsproxy.io/?url=";
var TPRC="https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL";
var TPEXC="https://www.tpex.org.tw/openapi/v1/tpex_mainboard_quotes";
var FINFO="https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockInfo";
var FEPS="https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockFinancialStatements&data_id=";
var LATEST_Q="26Q1";
var LATEST_YEAR=2026;
var LATEST_QN=1;
var COLS=[
{k:"rank",lb:"#",al:"c"},
{k:"sid",lb:"代號",al:"c"},
{k:"name",lb:"名稱",al:"l"},
{k:"ind",lb:"產業",al:"l"},
{k:"close",lb:"收盤價",al:"r",dynLb:true},
{k:"chg",lb:"漲跌",al:"r"},
{k:"pct",lb:"漲跌幅",al:"r"},
{k:"eps",lb:"EPS(元) 26Q1",al:"r"},
{k:"qoq",lb:"季增率",al:"r"},
{k:"yoy",lb:"年增率",al:"r"},
{k:"cumeps",lb:"累季EPS(元)",al:"r"},
{k:"cumy",lb:"累季年增率",al:"r"}
];
var BAD=["ETF","存託憑證","特別股","受益憑證","指數股票型","債券","基金","創新板"];
var G={tab:"twse",rows:{twse:[],tpex:[],watch:[]},sk:"eps",sd:"desc",ind:"",wl:[],dm:"",fEps:"",fQoq:"",fYoy:"",fCumy:"",priceDate:null};
function initG(){try{G.wl=JSON.parse(localStorage.getItem("_tw_eps_w")||"[]");}catch(e){G.wl=[];}}
function px(u){return (USE_LOCAL_PROXY?PROXY_LOCAL:PROXY_EXT)+encodeURIComponent(u);}async function pfetch(u){if(!USE_LOCAL_PROXY)return fetch(PROXY_EXT+encodeURIComponent(u));try{var r=await fetch(PROXY_LOCAL+encodeURIComponent(u));if(r.ok||r.status===402)return r;throw new Error("proxy err "+r.status);}catch(e){return fetch(PROXY_EXT+encodeURIComponent(u));}}
function ok4(c){return /^[1-9][0-9]{3,4}$/.test(c);}
function okN(n){for(var i=0;i<BAD.length;i++){if(n.indexOf(BAD[i])>=0)return false;}return true;}
function pf(v){if(v==null||v==="")return null;var n=parseFloat(String(v).replace(/,/g,""));return isNaN(n)?null:n;}
function f2(v){if(v==null)return"--";return parseFloat(v).toLocaleString("zh-TW",{minimumFractionDigits:2,maximumFractionDigits:2});}
function fp(v){if(v==null)return"--";var n=parseFloat(v);return(n>0?"+":"")+n.toLocaleString("zh-TW",{minimumFractionDigits:2,maximumFractionDigits:2})+"%";}
function cc(v){if(v==null)return"nu";return v>0?"up":v<0?"dn":"nu";}
function qLabel(y,q){return (y%100)+"Q"+q;}
function spg(pct,msg){document.getElementById("pgb").style.width=pct+"%";document.getElementById("pg").style.display="block";var s=document.getElementById("st");s.textContent=msg;s.className="st ld";}
function cpg(msg){document.getElementById("pg").style.display="none";document.getElementById("pgb").style.width="0%";var s=document.getElementById("st");s.textContent=msg;s.className="st";}
function serr(msg){document.getElementById("pg").style.display="none";var s=document.getElementById("st");s.textContent=msg;s.className="st er";}
function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},3000);}

function parseEpsData(data){
var qMap={};
for(var i=0;i<data.length;i++){
var d=data[i];
if(d.type!=="EPS")continue;
var dt=d.date||"";
var yr=parseInt(dt.slice(0,4));
var mo=parseInt(dt.slice(5,7));
var qn=mo<=3?1:mo<=6?2:mo<=9?3:4;
var key=yr+"_"+qn;
if(!qMap[key])qMap[key]={yr:yr,qn:qn,eps:pf(d.value)};
else if(d.value!=null)qMap[key].eps=pf(d.value);
}
return qMap;
}

function calcMetrics(qMap,yr,qn){
var cur=qMap[yr+"_"+qn];
if(!cur||cur.eps==null)return null;
var eps=cur.eps;
var pqY=qn>1?yr:yr-1, pqN=qn>1?qn-1:4;
var prevQ=qMap[pqY+"_"+pqN];
var qoq=(prevQ&&prevQ.eps!=null&&prevQ.eps!==0)?parseFloat(((eps-prevQ.eps)/Math.abs(prevQ.eps)*100).toFixed(2)):null;
var prevY=qMap[(yr-1)+"_"+qn];
var yoy=(prevY&&prevY.eps!=null&&prevY.eps!==0)?parseFloat(((eps-prevY.eps)/Math.abs(prevY.eps)*100).toFixed(2)):null;
var cumEps=0, cumEpsPY=0, cumOk=true, cumPYOk=true;
for(var q=1;q<=qn;q++){
var cq=qMap[yr+"_"+q];
if(cq&&cq.eps!=null)cumEps+=cq.eps; else cumOk=false;
var pq=qMap[(yr-1)+"_"+q];
if(pq&&pq.eps!=null)cumEpsPY+=pq.eps; else cumPYOk=false;
}
var cumy=(cumOk&&cumPYOk&&cumEpsPY!==0)?parseFloat(((cumEps-cumEpsPY)/Math.abs(cumEpsPY)*100).toFixed(2)):null;
return{eps:eps,qoq:qoq,yoy:yoy,cumEps:cumOk?parseFloat(cumEps.toFixed(2)):null,cumy:cumy};
}
async function loadTWSE(){
spg(5,"取得上市股票清單與股價...");
var r2=await pfetch(TPRC);
var prcArr=await r2.json();
spg(15,"取得上市 EPS 資料...");
var pm={};
for(var i=0;i<prcArr.length;i++){
var p2=prcArr[i];
if(!ok4(p2.Code)||!okN(p2.Name||""))continue;
var cl=pf(p2.ClosingPrice),ch=pf(p2.Change),cp=null;
if(cl!=null&&ch!=null&&ch!==0){var pv=cl-ch;if(pv!==0)cp=parseFloat((ch/Math.abs(pv)*100).toFixed(2));}
if(!G.priceDate&&p2.Date){G.priceDate=p2.Date.substring(4,6)+"/"+p2.Date.substring(6,8);}
pm[p2.Code]={close:cl,chg:ch,pct:cp,name:p2.Name||"",ind:p2.IndustryCode||""};
}
var infoRes=await pfetch(FINFO);
var infoData=await infoRes.json();
if(infoData.status===402){serr("FinMind API 請求已達上限，請稍候再試");return;}
var stocks=(infoData.data||[]).filter(function(s){return ok4(s.stock_id)&&okN(s.stock_name||"")&&s.type==="twse"&&okN(s.industry_category||"")&&(s.industry_category||"").indexOf("\u5275\u65b0")<0;});
var seenIds={};
stocks=stocks.filter(function(s){if(seenIds[s.stock_id])return false;seenIds[s.stock_id]=true;return true;});
spg(20,"載入上市 EPS 中，共 "+stocks.length+" 支...");
var startDate=(LATEST_YEAR-3)+"-01-01";
var BATCH=PROXY_LOCAL.indexOf("proxy?url=")>=0?15:5;
var rows=[];
for(var i=0;i<stocks.length;i+=BATCH){
var batch=stocks.slice(i,i+BATCH);
var promises=batch.map(function(s){
var url=FEPS+s.stock_id+"&start_date="+startDate;
return pfetch(url).then(function(r){return r.json();}).catch(function(){return{status:0,data:[]};}).then(function(d){return{s:s,arr:d.status===200?(d.data||[]):[]}; });
});
var batchR=await Promise.all(promises);
for(var b=0;b<batchR.length;b++){
var rs=batchR[b];
var qMap=parseEpsData(rs.arr);
var m=calcMetrics(qMap,LATEST_YEAR,LATEST_QN);
if(!m)continue;
var pr=pm[rs.s.stock_id]||{};
rows.push({
sid:rs.s.stock_id,
name:rs.s.stock_name||pr.name||rs.s.stock_id,
ind:rs.s.industry_category||"",
close:pr.close||null,chg:pr.chg||null,pct:pr.pct||null,
eps:m.eps,qoq:m.qoq,yoy:m.yoy,cumeps:m.cumEps,cumy:m.cumy
});
}
var done=i+batch.length;
var pct=20+Math.round(done/stocks.length*70);
spg(pct,"上市 EPS 載入中 "+done+"/"+stocks.length+"，已有 "+rows.length+" 筆");
if(rows.length&&done%100===0){G.rows.twse=rows.slice();if(G.tab==="twse"){populateInd("twse");renderTable(getRows());}}
if(i+BATCH<stocks.length)await new Promise(function(r){setTimeout(r,300);});
}
G.rows.twse=rows;
G.dm=LATEST_Q;
document.getElementById("hdrR").textContent="最新季度："+LATEST_Q;
populateInd("twse");renderTable(getRows());
cpg("上市：共 "+rows.length+" 檔，最新季度："+LATEST_Q);
}

async function loadTPEx(){
spg(5,"取得上櫃股票清單與股價...");
var infoRes=await pfetch(FINFO);
var infoData=await infoRes.json();
if(infoData.status===402){serr("FinMind API 請求已達上限，請稍候再試");return;}
var stocks=(infoData.data||[]).filter(function(s){return ok4(s.stock_id)&&okN(s.stock_name||"")&&s.type==="tpex";});
var seenIds={};
stocks=stocks.filter(function(s){if(seenIds[s.stock_id])return false;seenIds[s.stock_id]=true;return true;});
spg(8,"取得上櫃股價資料...");

spg(12,"取得 "+stocks.length+" 支上櫃股票，載入 EPS...");
var startDate=(LATEST_YEAR-3)+"-01-01";
var BATCH=PROXY_LOCAL.indexOf("proxy?url=")>=0?15:5;
var rows=[];
for(var i=0;i<stocks.length;i+=BATCH){
var batch=stocks.slice(i,i+BATCH);
var priceStart=(new Date(new Date().setDate(new Date().getDate()-10))).toISOString().slice(0,10);
var promises=batch.map(function(s){
var epsUrl=FEPS+s.stock_id+"&start_date="+startDate;
var priceUrl="https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockPrice&data_id="+s.stock_id+"&start_date="+priceStart;
return Promise.all([pfetch(epsUrl).then(function(r){return r&&r.status===200?r.json().then(function(d){return d.data||[]}):[]}).catch(function(){return[]}),pfetch(priceUrl).then(function(r){return r&&r.status===200?r.json().then(function(d){return d.data||[]}):[]}).catch(function(){return[]})]).then(function(res){return{s:s,arr:res[0],priceArr:res[1]}});
});
var batchR=await Promise.all(promises);
for(var b=0;b<batchR.length;b++){
var rs=batchR[b];
var qMap=parseEpsData(rs.arr);
var m=calcMetrics(qMap,LATEST_YEAR,LATEST_QN);
if(!m)continue;
var priceRec=rs.priceArr&&rs.priceArr.length?rs.priceArr[rs.priceArr.length-1]:null;
var pr={close:priceRec?pf(priceRec.close):null,chg:priceRec?pf(priceRec.spread):null,pct:priceRec&&priceRec.close&&priceRec.spread!=null?parseFloat((priceRec.spread/(priceRec.close-priceRec.spread)*100).toFixed(2)):null};
if(priceRec&&priceRec.date&&!G.priceDate){var pd=priceRec.date;G.priceDate=pd.slice(5,7)+"/"+pd.slice(8,10);}
rows.push({
sid:rs.s.stock_id,
name:rs.s.stock_name||rs.s.stock_id,
ind:rs.s.industry_category||"",
close:pr.close||null,chg:pr.chg||null,pct:pr.pct||null,
eps:m.eps,qoq:m.qoq,yoy:m.yoy,cumeps:m.cumEps,cumy:m.cumy
});
}
var done=i+batch.length;
var pct=12+Math.round(done/stocks.length*68);
spg(pct,"上櫃 EPS 載入中 "+done+"/"+stocks.length+"，已有 "+rows.length+" 筆");
if(rows.length&&done%150===0){G.rows.tpex=rows.slice();if(G.tab==="tpex"){populateInd("tpex");renderTable(getRows());}}
if(i+BATCH<stocks.length)await new Promise(function(r){setTimeout(r,300);});
}
G.rows.tpex=rows;
G.dm=LATEST_Q;
document.getElementById("hdrR").textContent="最新季度："+LATEST_Q;
populateInd("tpex");renderTable(getRows());
cpg("上櫃：共 "+rows.length+" 檔，最新季度："+LATEST_Q);
}
async function loadWatch(){
var ids=G.wl;
if(!ids.length){G.rows.watch=[];renderTable([]);cpg("自選股：尚未新增股票");return;}
spg(5,"取得自選股 EPS 資料...");
var infoRes=await pfetch(FINFO);
var infoData=await infoRes.json();
var infoMap={};

// NEW: SVG bar chart for EPS history
function renderEpsChart(hist){
if(!hist||!hist.length)return'<div class="em" style="padding:20px">無歷史資料</div>';
// Show up to 12 most recent quarters (hist is newest-first)
var data=hist.slice(0,12).reverse(); // now oldest-first for chart
var W=760,H=160,PL=36,PR=10,PT=10,PB=32;
var cW=W-PL-PR,cH=H-PT-PB;
var eps=data.map(function(d){return d.eps!=null?d.eps:0;});
var mn=Math.min.apply(null,eps),mx=Math.max.apply(null,eps);
var hasNeg=mn<0;
// Add some padding to range
var range=mx-mn||1;
var yMin=hasNeg?mn-range*0.1:Math.min(0,mn);
var yMax=mx+range*0.1;
var yRange=yMax-yMin||1;
var n=data.length;
var bW=Math.floor((cW-n*2)/(n||1));
var bGap=Math.floor((cW-bW*n)/(n+1));
// Zero line Y position
var zeroY=PT+cH-(0-yMin)/yRange*cH;
var svg='<svg width="100%" viewBox="0 0 '+W+' '+H+'" style="display:block;overflow:visible" xmlns="http://www.w3.org/2000/svg">';
// Grid lines
var gridVals=[];
var step=range/3;
for(var g=0;g<=3;g++)gridVals.push(yMin+step*g);
gridVals.forEach(function(gv){
var gy=PT+cH-(gv-yMin)/yRange*cH;
svg+='<line x1="'+PL+'" y1="'+gy.toFixed(1)+'" x2="'+(W-PR)+'" y2="'+gy.toFixed(1)+'" stroke="#eee" stroke-width="1"/>';
var gl=gv>=0?(gv>0?"+":"")+gv.toFixed(1):gv.toFixed(1);
svg+='<text x="'+(PL-4)+'" y="'+(gy+4).toFixed(1)+'" text-anchor="end" font-size="10" fill="#aaa">'+gl+'</text>';
});
// Zero line if range includes negative
if(hasNeg){
svg+='<line x1="'+PL+'" y1="'+zeroY.toFixed(1)+'" x2="'+(W-PR)+'" y2="'+zeroY.toFixed(1)+'" stroke="#bbb" stroke-width="1" stroke-dasharray="3,2"/>';
}
// Bars
for(var i=0;i<n;i++){
var d=data[i];
var v=d.eps!=null?d.eps:0;
var x=PL+bGap+i*(bW+bGap);
var barH=Math.abs(v-0)/yRange*cH;
var barY=v>=0?PT+cH-(v-yMin)/yRange*cH:zeroY;
if(v<0)barH=Math.abs(v)/yRange*cH;
var color=v>=0?"#1a6fc4":"#e05252";
svg+='<rect x="'+x.toFixed(1)+'" y="'+barY.toFixed(1)+'" width="'+bW+'" height="'+Math.max(1,barH).toFixed(1)+'" fill="'+color+'" rx="2" opacity="0.85"/>';
// EPS value label on bar
var labelY=v>=0?(barY-3).toFixed(1):(barY+barH+11).toFixed(1);
if(barH>14){labelY=v>=0?(barY+12).toFixed(1):(barY+barH-3).toFixed(1);}
svg+='<text x="'+(x+bW/2).toFixed(1)+'" y="'+labelY+'" text-anchor="middle" font-size="9" fill="'+color+'" font-weight="600">'+v.toFixed(2)+'</text>';
// X axis label
var lx=(x+bW/2).toFixed(1);
var ly=(PT+cH+PB-4).toFixed(1);
svg+='<text x="'+lx+'" y="'+ly+'" text-anchor="middle" font-size="10" fill="#777">'+d.label+'</text>';
}
svg+='</svg>';
return svg;
}

tbl+='<tr><td class="l"><span class="badge badge-q">'+h.label+'</span></td>';
tbl+='<td class="'+cc(h.eps)+'">'+f2(h.eps)+'</td>';
tbl+='<td class="'+cc(h.qoq)+'">'+fp(h.qoq)+'</td>';
tbl+='<td class="'+cc(h.yoy)+'">'+fp(h.yoy)+'</td>';

}
tbl+='</tbody></table>';

}

function dlDetailCSV(){
var row=MO.row,hist=MO.hist;if(!hist||!hist.length)return;
var csv="\uFEFF\u5b63\u5ea6,EPS(\u5143),\u5b63\u589e\u7387,\u5e74\u589e\u7387\n";
hist.slice().reverse().forEach(function(h){csv+=h.label+","+f2(h.eps)+","+fp(h.qoq)+","+fp(h.yoy)+"\n";});
var a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv;charset=utf-8;"}));

}

[["\u5b63\u5ea6","EPS(\u5143)","\u5b63\u589e\u7387","\u5e74\u589e\u7387"]].concat(hist.slice().reverse().map(function(h){return[h.label,f2(h.eps),fp(h.qoq),fp(h.yoy)];})).forEach(function(r){
x+="<Row>";r.forEach(function(v){var s=String(v==null?"":v).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");x+='<Cell><Data ss:Type="String">'+s+"</Data></Cell>";});x+="</Row>\n";
});
x+="</Table></Worksheet></Workbook>";

}
