<script>
var PX=location.hostname.indexOf("pages.dev")>=0?"/api/proxy?url=":"https://corsproxy.io/?url=";
var TPRC="https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL";
var FINFO="https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockInfo";
var FEPS="https://api.finmindtrade.com/api/v4/data?dataset=TaiwanStockFinancialStatements&data_id=";
var LATEST_Q="26Q1";
var LATEST_YEAR=2026;
var LATEST_QN=1;
var COLS=[
  {k:"rank",lb:"#",al:"c"},
  {k:"sid",lb:"д»Јиҷҹ",al:"c"},
  {k:"name",lb:"еҗҚзЁұ",al:"l"},
  {k:"ind",lb:"з”ўжҘӯ",al:"l"},
  {k:"close",lb:"ж”¶зӣӨеғ№",al:"r"},
  {k:"chg",lb:"жјІи·Ң",al:"r"},
  {k:"pct",lb:"жјІи·Ңе№…",al:"r"},
  {k:"eps",lb:"EPS(е…ғ) 26Q1",al:"r"},
  {k:"qoq",lb:"еӯЈеўһзҺҮ",al:"r"},
  {k:"yoy",lb:"е№ҙеўһзҺҮ",al:"r"},
  {k:"cumeps",lb:"зҙҜеӯЈEPS(е…ғ)",al:"r"},
  {k:"cumy",lb:"зҙҜеӯЈе№ҙеўһзҺҮ",al:"r"}
];
var BAD=["ETF","еӯҳиЁ—жҶ‘иӯү","зү№еҲҘиӮЎ","еҸ—зӣҠжҶ‘иӯү","жҢҮж•ёиӮЎзҘЁеһӢ","еӮөеҲё","еҹәйҮ‘"];
var G={tab:"twse",rows:{twse:[],tpex:[],watch:[]},sk:"eps",sd:"desc",ind:"",wl:[],dm:"",fEps:"",fQoq:"",fYoy:"",fCumy:""};
function initG(){try{G.wl=JSON.parse(localStorage.getItem("_tw_eps_w")||"[]");}catch(e){G.wl=[];}}
function px(u){return PX+encodeURIComponent(u);}
function ok4(c){return /^[1-9][0-9]{3,4}$/.test(c);}
function okN(n){for(var i=0;i<BAD.length;i++){if(n.indexOf(BAD[i])>=0)return false;}return true;}
function pf(v){if(v==null||v==="")return null;var n=parseFloat(String(v).replace(/,/g,""));return isNaN(n)?null:n;}
function f2(v){if(v==null)return"--";return parseFloat(v).toLocaleString("zh-TW",{minimumFractionDigits:2,maximumFractionDigits:2});}
function fp(v){if(v==null)return"--";var n=parseFloat(v);return(n>0?"+":"")+n.toLocaleString("zh-TW",{minimumFractionDigits:2,maximumFractionDigits:2})+"%";}
function cc(v){if(v==null)return"nu";return v>0?"up":v<0?"dn":"nu";}
function qLabel(y,q){return (y-1911)+"Q"+q;}
function spg(pct,msg){document.getElementById("pgb").style.width=pct+"%";document.getElementById("pg").style.display="block";var s=document.getElementById("st");s.textContent=msg;s.className="st ld";}
function cpg(msg){document.getElementById("pg").style.display="none";document.getElementById("pgb").style.width="0%";var s=document.getElementById("st");s.textContent=msg;s.className="st";}
function serr(msg){document.getElementById("pg").style.display="none";var s=document.getElementById("st");s.textContent=msg;s.className="st er";}
function showToast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},3000);}

function parseEpsData(data){
  // data: array of {date, stock_id, type, value, origin_name}
  // EPS is type=="EPS" per quarter
  // date format: "2026-03-31" (Q1 end), "2025-12-31"(Q4), "2025-09-30"(Q3), "2025-06-30"(Q2)
  var qMap={};
  for(var i=0;i<data.length;i++){
    var d=data[i];
    if(d.type!=="EPS")continue;
    var dt=d.date||"";
    var yr=parseInt(dt.slice(0,4));
    var mo=parseInt(dt.slice(5,7));
    var qn=mo<=3?1:mo<=6?2:mo<=9?3:4;
    var key=yr+"_"+qn;
    if(!qMap[key])qMap[key]={yr:yr,qn:qn,eps:pf(d.value)};
    else if(d.value!=null)qMap[key].eps=pf(d.value);
  }
  return qMap;
}

function calcMetrics(qMap,yr,qn){
  var cur=qMap[yr+"_"+qn];
  if(!cur||cur.eps==null)return null;
  var eps=cur.eps;
  // qoq: previous quarter
  var pqY=qn>1?yr:yr-1, pqN=qn>1?qn-1:4;
  var prevQ=qMap[pqY+"_"+pqN];
  var qoq=(prevQ&&prevQ.eps!=null&&prevQ.eps!==0)?parseFloat(((eps-prevQ.eps)/Math.abs(prevQ.eps)*100).toFixed(2)):null;
  // yoy: same quarter last year
  var prevY=qMap[(yr-1)+"_"+qn];
  var yoy=(prevY&&prevY.eps!=null&&prevY.eps!==0)?parseFloat(((eps-prevY.eps)/Math.abs(prevY.eps)*100).toFixed(2)):null;
  // cumulative EPS (Q1 to current quarter this year)
  var cumEps=0, cumEpsPY=0, cumOk=true, cumPYOk=true;
  for(var q=1;q<=qn;q++){
    var cq=qMap[yr+"_"+q];
    if(cq&&cq.eps!=null)cumEps+=cq.eps; else cumOk=false;
    var pq=qMap[(yr-1)+"_"+q];
    if(pq&&pq.eps!=null)cumEpsPY+=pq.eps; else cumPYOk=false;
  }
  var cumy=(cumOk&&cumPYOk&&cumEpsPY!==0)?parseFloat(((cumEps-cumEpsPY)/Math.abs(cumEpsPY)*100).toFixed(2)):null;
  return{eps:eps,qoq:qoq,yoy:yoy,cumEps:cumOk?parseFloat(cumEps.toFixed(2)):null,cumy:cumy};
}
async function loadTWSE(){
  spg(5,"еҸ–еҫ—дёҠеёӮиӮЎзҘЁжё…е–®иҲҮиӮЎеғ№...");
  var r2=await fetch(px(TPRC));
  var prcArr=await r2.json();
  spg(15,"еҸ–еҫ—дёҠеёӮ EPS иіҮж–ҷ...");
  var pm={};
  for(var i=0;i<prcArr.length;i++){
    var p2=prcArr[i];
    if(!ok4(p2.Code)||!okN(p2.Name||""))continue;
    var cl=pf(p2.ClosingPrice),ch=pf(p2.Change),cp=null;
    if(cl!=null&&ch!=null&&ch!==0){var pv=cl-ch;if(pv!==0)cp=parseFloat((ch/Math.abs(pv)*100).toFixed(2));}
    pm[p2.Code]={close:cl,chg:ch,pct:cp,name:p2.Name||"",ind:p2.IndustryCode||""};
  }
  var infoRes=await fetch(px(FINFO));
  var infoData=await infoRes.json();
  if(infoData.status===402){serr("FinMind API и«ӢжұӮе·ІйҒ”дёҠйҷҗпјҢи«ӢзЁҚеҖҷеҶҚи©Ұ");return;}
  var stocks=(infoData.data||[]).filter(function(s){return ok4(s.stock_id)&&okN(s.stock_name||"")&&s.type==="twse";});
  var seenIds={};
  stocks=stocks.filter(function(s){if(seenIds[s.stock_id])return false;seenIds[s.stock_id]=true;return true;});
  spg(20,"ијүе…ҘдёҠеёӮ EPS дёӯпјҢе…ұ "+stocks.length+" ж”Ҝ...");
  var startDate=(LATEST_YEAR-3)+"-01-01";
  var BATCH=PX.indexOf("proxy?url=")>=0?15:5;
  var rows=[];
  for(var i=0;i<stocks.length;i+=BATCH){
    var batch=stocks.slice(i,i+BATCH);
    var promises=batch.map(function(s){
      var url=FEPS+s.stock_id+"&start_date="+startDate;
      return fetch(px(url)).then(function(r){return r.json();}).catch(function(){return{status:0,data:[]};}).then(function(d){return{s:s,arr:d.status===200?(d.data||[]):[]}; });
    });
    var batchR=await Promise.all(promises);
    for(var b=0;b<batchR.length;b++){
      var rs=batchR[b];
      var qMap=parseEpsData(rs.arr);
      var m=calcMetrics(qMap,LATEST_YEAR,LATEST_QN);
      if(!m)continue;
      var pr=pm[rs.s.stock_id]||{};
      rows.push({
        sid:rs.s.stock_id,
        name:rs.s.stock_name||pr.name||rs.s.stock_id,
        ind:rs.s.industry_category||"",
        close:pr.close||null,chg:pr.chg||null,pct:pr.pct||null,
        eps:m.eps,qoq:m.qoq,yoy:m.yoy,cumeps:m.cumEps,cumy:m.cumy
      });
    }
    var done=i+batch.length;
    var pct=20+Math.round(done/stocks.length*70);
    spg(pct,"дёҠеёӮ EPS ијүе…Ҙдёӯ "+done+"/"+stocks.length+"пјҢе·Іжңү "+rows.length+" зӯҶ");
    if(rows.length&&done%100===0){G.rows.twse=rows.slice();if(G.tab==="twse"){populateInd("twse");renderTable(getRows());}}
    if(i+BATCH<stocks.length)await new Promise(function(r){setTimeout(r,300);});
  }
  G.rows.twse=rows;
  G.dm=LATEST_Q;
  document.getElementById("hdrR").textContent="жңҖж–°еӯЈеәҰпјҡ"+LATEST_Q;
  populateInd("twse");renderTable(getRows());
  cpg("дёҠеёӮпјҡе…ұ "+rows.length+" жӘ”пјҢжңҖж–°еӯЈеәҰпјҡ"+LATEST_Q);
}

    if(rows.length&&done%150===0){G.rows.tpex=rows.slice();if(G.tab==="tpex"){populateInd("tpex");renderTable(getRows());}}
    if(i+BATCH<stocks.length)await new Promise(function(r){setTimeout(r,300);});
  }
  G.rows.tpex=rows;

function getRows(){
  var rows=(G.rows[G.tab]||[]).slice();
  if(G.tab!=="watch"&&G.ind){rows=rows.filter(function(r){return r.ind===G.ind;});}
  if(G.tab!=="watch"){
    var _fe=G.fEps!==""?parseFloat(G.fEps):null;
    var _fq=G.fQoq!==""?parseFloat(G.fQoq):null;
    var _fy=G.fYoy!==""?parseFloat(G.fYoy):null;
    var _fc=G.fCumy!==""?parseFloat(G.fCumy):null;
    if(_fe!=null||_fq!=null||_fy!=null||_fc!=null){
      rows=rows.filter(function(r){
        if(_fe!=null&&(r.eps==null||r.eps<_fe))return false;
        if(_fq!=null&&(r.qoq==null||r.qoq<_fq))return false;
        if(_fy!=null&&(r.yoy==null||r.yoy<_fy))return false;
        if(_fc!=null&&(r.cumy==null||r.cumy<_fc))return false;
        return true;
      });
    }
  }
  var sk=G.sk,sd=G.sd;
  rows.sort(function(a,b){
    var d=sd==="asc"?1:-1;
    if(sk==="name")return d*(a.name||"").localeCompare(b.name||"","zh-TW");
    if(sk==="sid")return d*(a.sid||"").localeCompare(b.sid||"");
    if(sk==="ind")return d*(a.ind||"").localeCompare(b.ind||"","zh-TW");
    var av=a[sk],bv=b[sk];
    if(av==null)return 1;if(bv==null)return -1;
    return d*(parseFloat(av)-parseFloat(bv));
  });
  return rows;
}

    if(rows[i].yoy!=null){yoys.push(rows[i].yoy);if(rows[i].yoy>0)up++;else if(rows[i].yoy<0)dn++;}

}

async function fetchDetailHist(row){
  var startDate=(LATEST_YEAR-6)+"-01-01";
  try{
    var url=FEPS+row.sid+"&start_date="+startDate;
    var res=await fetch(px(url)),d=await res.json();
    var arr=d.status===200?(d.data||[]):[];
    var qMap=parseEpsData(arr);
    // Sort quarters
    var keys=Object.keys(qMap).sort(function(a,b){
      var [ay,aq]=a.split("_").map(Number);
      var [by,bq]=b.split("_").map(Number);
      return ay!==by?ay-by:aq-bq;
    });
    var hist=[];
    keys.forEach(function(key){
      var [yr,qn]=key.split("_").map(Number);
      var cur=qMap[key];if(!cur||cur.eps==null)return;
      var eps=cur.eps;
      var pqY=qn>1?yr:yr-1, pqN=qn>1?qn-1:4;
      var prevQ=qMap[pqY+"_"+pqN];
      var qoq=(prevQ&&prevQ.eps!=null&&prevQ.eps!==0)?parseFloat(((eps-prevQ.eps)/Math.abs(prevQ.eps)*100).toFixed(2)):null;
      var prevY=qMap[(yr-1)+"_"+qn];
      var yoy=(prevY&&prevY.eps!=null&&prevY.eps!==0)?parseFloat(((eps-prevY.eps)/Math.abs(prevY.eps)*100).toFixed(2)):null;
      hist.push({yr:yr,qn:qn,eps:eps,qoq:qoq,yoy:yoy,label:(yr-1911)+"Q"+qn});
    });
    MO.hist=hist;
  }catch(e){MO.hist=[];}
}

  filtered.slice().reverse().forEach(function(h){
    var qc=cc(h.qoq),yc=cc(h.yoy),ec=cc(h.eps);
    html+='<tr><td class="l">'+h.label+'</td><td class="'+ec+'">'+f2(h.eps)+'</td><td class="'+qc+'">'+fp(h.qoq)+'</td><td class="'+yc+'">'+fp(h.yoy)+'</td></tr>';
  });
  html+='</tbody></table></div>';
  body.innerHTML=html;
  requestAnimationFrame(function(){drawEpsChart(filtered);});
}

function drawEpsChart(data){
  var canvas=document.getElementById("mo-chart");if(!canvas)return;
  var dpr=window.devicePixelRatio||1;
  var W=canvas.parentElement.clientWidth||760,H=220;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+"px";canvas.style.height=H+"px";
  var ctx=canvas.getContext("2d");ctx.scale(dpr,dpr);
  var pad={l:58,r:58,t:14,b:36},cW=W-pad.l-pad.r,cH=H-pad.t-pad.b,n=data.length;
  if(n<1)return;
  var epss=data.map(function(d){return d.eps||0;});
  var maxR=Math.max.apply(null,epss)||1,minR=Math.min.apply(null,epss);
  var rPad=(maxR-minR)*0.12,rMax=maxR+rPad,rMin=minR-rPad,rRange=rMax-rMin||1;
  var allP=[];data.forEach(function(d){if(d.qoq!=null)allP.push(d.qoq);if(d.yoy!=null)allP.push(d.yoy);});
  var pA=allP.length?Math.max(Math.abs(Math.max.apply(null,allP)),Math.abs(Math.min.apply(null,allP))):50;
  pA=Math.max(pA,10);var pMax=Math.ceil((pA*1.1)/10)*10,pMin=-pMax;
  var bW=Math.max(2,cW/n*0.72);
  function xP(i){return pad.l+(i+0.5)*(cW/n);}
  function yR(v){return pad.t+cH-(v-rMin)/rRange*cH;}
  function yP(v){return pad.t+(1-(v-pMin)/(pMax-pMin))*cH;}
  ctx.fillStyle="#fafbfc";ctx.fillRect(pad.l,pad.t,cW,cH);
  ctx.strokeStyle="#e8eaf0";ctx.lineWidth=1;
  for(var gi=0;gi<=4;gi++){var gy=pad.t+gi/4*cH;ctx.beginPath();ctx.moveTo(pad.l,gy);ctx.lineTo(pad.l+cW,gy);ctx.stroke();}
  var zy=yP(0);if(zy>=pad.t&&zy<=pad.t+cH){ctx.strokeStyle="#c0c4cc";ctx.setLineDash([3,3]);ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(pad.l,zy);ctx.lineTo(pad.l+cW,zy);ctx.stroke();ctx.setLineDash([]);}
  for(var i=0;i<n;i++){
    var bx=xP(i)-bW/2,ev=epss[i],byT,bH2;
    var zeroY=yR(Math.max(rMin,0));
    if(ev>=0){byT=yR(ev);bH2=zeroY-byT;ctx.fillStyle="rgba(26,111,196,0.6)";}
    else{byT=zeroY;bH2=yR(ev)-zeroY;ctx.fillStyle="rgba(224,82,82,0.5)";}
    if(bH2>0)ctx.fillRect(bx,byT,bW,bH2);
  }
  ctx.strokeStyle="#e05252";ctx.lineWidth=2;ctx.setLineDash([]);ctx.beginPath();var st=false;
  for(var i=0;i<n;i++){if(data[i].qoq==null)continue;var lx=xP(i),ly=yP(data[i].qoq);if(!st){ctx.moveTo(lx,ly);st=true;}else ctx.lineTo(lx,ly);}ctx.stroke();
  ctx.strokeStyle="#2a9d5c";ctx.lineWidth=2;ctx.beginPath();st=false;
  for(var i=0;i<n;i++){if(data[i].yoy==null)continue;var lx=xP(i),ly=yP(data[i].yoy);if(!st){ctx.moveTo(lx,ly);st=true;}else ctx.lineTo(lx,ly);}ctx.stroke();
  ctx.fillStyle="#888";ctx.font="11px 'Helvetica Neue',Arial,sans-serif";ctx.textAlign="center";
  var step=Math.max(1,Math.ceil(n/8));
  for(var i=0;i<n;i+=step){ctx.fillText(data[i].label,xP(i),pad.t+cH+14);}
  ctx.fillStyle="#1a6fc4";ctx.textAlign="right";
  for(var gi=0;gi<=4;gi++){var gv=rMin+gi/4*rRange,gy2=pad.t+cH-gi/4*cH;ctx.fillText(gv.toFixed(2),pad.l-6,gy2+4);}
  ctx.fillStyle="#666";ctx.textAlign="left";
  for(var gi=0;gi<=4;gi++){var gv2=pMin+gi/4*(pMax-pMin),gy3=pad.t+cH-gi/4*cH;ctx.fillText((gv2>0?"+":"")+gv2.toFixed(0)+"%",pad.l+cW+6,gy3+4);}
  ctx.strokeStyle="#dde1e7";ctx.lineWidth=1;ctx.setLineDash([]);ctx.strokeRect(pad.l,pad.t,cW,cH);
}

  initG();renderHead();loadData();
  document.addEventListener("keydown",function(e){if(e.key==="Escape")closeMo();});
